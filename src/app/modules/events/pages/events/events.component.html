<div class="events">
    <!-- <img src="assets/images/global/pages-wave-top.webp" alt="" class="pages-wave-top"> -->
    <app-search [Title]="'Our Events'" (searchEmitter)="searchForEvents($event)"></app-search>
    <div class="latest-event" *ngIf="pageTopEvent && !topEventLoading && !searchMode">
        <div class="pms-container">
            <div class="grid">
                <div class="event-img md:col-6 sm:col-12 max-h-30rem min-h-30rem">
                    <img [src]="pageTopEvent?.image" class="max-h-30rem min-h-30rem border-round-xl" alt="">
                </div>
                <div class="event-info md:col-6 sm:col-12 max-h-30rem min-h-30rem">
                    <h3 class="title subtitle-font-size">
                        Latest Event
                    </h3>
                    <h5 class="short-desc">
                        {{ pageTopEvent?.title }}
                    </h5>
                    <div class="desc" [innerHTML]="pageTopEvent?.desc">
                    </div>
                    <div class="action flex align-items-center justify-content-between">
                        <span class="date">
                            {{ pageTopEvent?.start_date }}
                        </span>
                        <p-button icon="pi pi-angle-right" [rounded]="true" severity="secondary"
                        [routerLink]="'/events/details/' + pageTopEvent?.slug" />
                    </div>

                </div>
            </div>
        </div>
    </div>
    <app-center-bar *ngIf="!searchMode" [Title]="'Events & Activities'" [Desc]="'It is a long established fact that a reader will be distracted by the of readable content of page  lookings at its layouts  points.'"></app-center-bar>
    <div class="events-list" *ngIf="eventsList?.length && !eventsLoading">
        <div class="pms-container">
            <div class="filtered-events mt-5">
                <div class="grid">
                    <ng-container *ngIf="eventsList.length">
                        <div class="card-wrapper xl:col-4 md:col-6 sm:col-12 mb-4" *ngFor="let event of eventsList">
                            <app-event-card [eventData]="event"></app-event-card>
                        </div>
                    </ng-container>
                    <div class="load-more" *ngIf="paginationData?.total! > eventsList?.length!">
                        <p-button label="More..." (click)="loadMore()" />
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
