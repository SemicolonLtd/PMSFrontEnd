<div class="certificates pb-5">
    <div class="header flex align-items-center justify-content-center">
        <img src="assets/images/global/certificates.webp" alt="" class="cover">
        <div class="content">
            <h2 class="title">{{'Certificates.Certificates' | translate}}</h2>
            <span class="text mt-3">
                {{'Certificates.Desc' | translate}}
            </span>
        </div>
    </div>
    <div class="center-bar flex align-items-center justify-content-center my-5">
        <div class="wrapper text-center">
            <h4 class="title subtitle-font-size">{{'Certificates.PMSCertificates' | translate}} </h4>
            <span class="txt">
                It is a long established fact that a reader will be distracted by the of readable content of page  lookings at its layouts  points.
            </span>
        </div>
    </div>
    <ng-container *ngIf="certificatesList?.length && !loading">
        <div class="all-certificates">
            <div class="pms-container">
                <div class="grid justify-content-center">
                    <div class="xl:col-3 md:col-4 sm:col-6 mb-5" *ngFor="let certificate of certificatesList">
                        <div class="certificate-card">
                            <p-image 
                                [src]="certificate.image"
                                alt="Image"
                                [preview]="true" 
                            >
                            <ng-template pTemplate="indicator">
                                <img class="h-6rem icon-image" src="assets/images/global/certificate-icon.svg" alt="">
                            </ng-template>
                        </p-image>
                            <div class="card-footer">
                                <h3 class="card-title">{{certificate.title}}</h3>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
            <div class="more-btn">
                <span class="icon-wrapper">
                    <i class="pi pi-angle-down"></i>
                </span>
            </div>
        </div>
        <div class="load-more"  *ngIf="paginationData?.total! > certificatesList?.length!">
            <p-button label="More..." (click)="loadMore()" />
        </div>
    </ng-container>
    <app-loading type="small" *ngIf="loading" ></app-loading>
</div>
