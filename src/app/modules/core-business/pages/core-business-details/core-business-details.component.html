<div class="project-details margin-avoid-navbar">
    <div class="pms-container">
        <app-breadcrumb [breadcrumbItems]="breadcrumbItems"></app-breadcrumb>
        <div class="project-info" *ngIf="businessData?.title && !loading">
            <div class="grid">
                <div class="col-12">
                    <div class="head-wrapper flex align-items-center justify-content-end">
                        <!-- <h2 class="project-title">{{ businessData?.title }}</h2> -->
                        <div class="share_details">
                            <span class="txt">
                                {{ 'General.Share' | translate }}
                            </span>
                            <!-- (opened)="onLinkOpened($event)" -->
                            <button class="share_link" shareButton="facebook"  
                            [url]="websiteUrl + '/core-business/details/' + businessData?.slug"
                            [title]="businessData.title"
                            [image]="businessData.image"
                            [description]="businessData.short"
                            >
                                <img src="assets/images/global/facebook.svg" alt="">
                            </button>
                            <button class="share_link" shareButton="twitter"
                            [url]="websiteUrl + '/core-business/details/' + businessData?.slug"
                            [title]="businessData.title"
                            [image]="businessData.image"
                            [description]="businessData.short">
                                <img src="assets/images/global/twitter.svg" alt="">
                            </button>
                        </div>
                    </div>
                </div>
                <div class="content-wrapper col-12">
                    <div class="images">
                        <div class="news-images">
                            <p-galleria [value]="businessData?.media" [responsiveOptions]="responsiveOptions"
                                [numVisible]="5">
                                <ng-template pTemplate="item" let-item>
                                    <p-image [src]="item.image"  [preview]="true"  />
                                </ng-template>
                                <ng-template pTemplate="thumbnail" let-item>
                                    <div class="grid grid-nogutter justify-content-center">
                                        <img [src]="item.image" style="width: 100%;" />
                                    </div>
                                </ng-template>
                            </p-galleria>
                        </div>
                    </div>
                    <div class="text" [innerHTML]="sanitizeHtml(businessData?.desc)">
                    </div>
                </div>
            </div>
        </div>
        <app-loading type="small" *ngIf="loading" ></app-loading>

        <div class="similar-projects mt-5" *ngIf="businessProjectsData?.length && !businessProjectsLoading">
            <span class="title block font-bold text-2xl pb-2 mb-4 color-primary-medium">
                {{'SimilarTitles.CoreBusinessProjects' | translate}}
            </span>
            <!-- <p-carousel [value]="businessProjectsData" [numVisible]="3" [numScroll]="3" [circular]="true"
                [showIndicators]="false" [responsiveOptions]="responsiveOptions" autoplayInterval="3000" 
                [ngClass]="businessProjectsData.length === 1 ? 'length-one' : ''">
                <ng-template let-product pTemplate="item">
                    <div class="m-2 p-3">
                        <app-project-card [projectData]="product"></app-project-card>
                    </div>
                </ng-template>
            </p-carousel> -->
            <div class="grid">
                <div class="xl:col-3 lg:col-4 md:col-6 sm:col-12 mb-3" *ngFor="let project of businessProjectsData">
                    <app-project-card [projectData]="project"></app-project-card>
                </div>
            </div>
        </div>
        <app-loading type="small" *ngIf="businessProjectsLoading" ></app-loading>
    </div>
</div>
