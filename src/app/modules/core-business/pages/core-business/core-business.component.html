<div class="core-business margin-avoid-navbar">
    <app-search [Title]="searchTitle"  (searchEmitter)="searchForBusiness($event)"></app-search>
    <ng-container *ngIf="coreList?.length && !loading">
        <ng-container *ngFor="let core of coreList; let i = index">
            <div class="core-img-end" *ngIf="i % 2 === 0">
                <app-center-bar *ngIf="!searchMode" [Title]="core.title" [Desc]="core.pref" [htmlDesc]="true"></app-center-bar>
                <div class="pms-container">
                    <div class="grid mt-5 justify-content-between">
                        <div class="lg:col-6 md:col-12 sm:col-12 mb-4">
                            <div class="core-data">
                                <p-accordion [activeIndex]="0">
                                    <p-accordionTab *ngFor="let tab of core.business" [header]="tab.name">
                                        <div [innerHTML]="tab.desc"></div>
                                        <div class="action flex align-items-center justify-content-end cursor-pointer" [routerLink]="'details/' + tab.slug">
                                            <span class="text">
                                                {{ 'General.ReadMore' | translate}} 
                                            </span>
                                            <i class="pi pi-angle-double-right"></i>
                                        </div>
                                    </p-accordionTab>
                                </p-accordion>
                            </div>
                        </div>
                        <div class="lg:col-5 md:col-12 sm:col-12 mb-4">
                            <div class="core-img">
                                <img class="w-full border-round-2xl" [src]="core.image" alt="">
                            </div>
                        </div>
                    </div>
                </div>
            </div>
            <div class="core-img-start" *ngIf="i % 2 === 1">
                <app-center-bar [Title]="core.title" [Desc]="core.pref"></app-center-bar>
                <div class="pms-container">
                    <div class="grid mt-5 img-start justify-content-between">
                        <div class="lg:col-5 md:col-12 sm:col-12 mb-4">
                            <div class="core-img">
                                <img class="w-full border-round-2xl" [src]="core.image" alt="">
                            </div>
                        </div>
                        <div class="lg:col-6 md:col-12 sm:col-12 mb-4">
                            <div class="core-data">
                                <p-accordion [activeIndex]="0">
                                    <p-accordionTab *ngFor="let tab of core.business" [header]="tab.name">
                                        <div [innerHTML]="tab.desc"></div>
                                        <div class="action flex align-items-center justify-content-end cursor-pointer" [routerLink]="'details/' + tab.slug">
                                            <span class="text">
                                                {{ 'General.ReadMore' | translate}} 
                                            </span>
                                            <i class="pi pi-angle-double-right"></i>
                                        </div>
                                    </p-accordionTab>
                                </p-accordion>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </ng-container>
    </ng-container>
    <div class="load-more" *ngIf="(paginationData?.total! > coreList?.length!) && !loading">
        <p-button label="{{'Projects.More' | translate}}" (click)="loadMore()" />
    </div>
    <app-loading type="small" *ngIf="loading" ></app-loading>
    <app-empty-state *ngIf="!coreList?.length && !loading"></app-empty-state>
</div>
