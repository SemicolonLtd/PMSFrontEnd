<div class="header-section">
    <div id="carouselExampleCaptions" class="carousel slide carousel-fade" data-bs-pause="false" data-bs-ride="carousel" data-bs-interval="45000">
        <div class="carousel-indicators">
            <button type="button" *ngFor="let slider of slidersData; let i = index" data-bs-target="#carouselExampleCaptions" [attr.data-bs-slide-to]="i" [ngClass]="{'active': i === 0}"  aria-current="true" [attr.aria-label]="slider.title"></button>
        </div>
        <div class="carousel-inner">
            <div class="carousel-item" *ngFor="let slider of slidersData; let i = index" [ngClass]="{'active' : i === 0}">
                <img *ngIf="slider.type == 'image'" [src]="slider.image" class="d-block w-100 header-bg" alt="...">
                <video *ngIf="slider.type == 'video'" #video (canplay)="video.play()" (loadedmetadata)="video.muted = true" class="d-block w-100 header-bg" autoplay muted loop>
                    <source [src]="slider.image" type="video/mp4">
                </video>
                <div class="carousel-caption d-block">
                    <!-- <img class="header-logo" src="assets/images/global/logo.svg" alt=""> -->
                    <h5 class="header-title">{{slider.title}}</h5>
                    <div class="header-desc" [innerHTML]="slider.desc | textSlice : 'desc' : 150">
                    </div>
                    <a type="button" target="_blank" *ngIf="slider.link_to" class="btn btn-light show-more" [href]="slider.link_to">
                        {{slider.button}}
                    </a>
                    <div class="statistics flex justify-content-center align-items-center">
                        <div class="item-wrapper">
                            <span class="count-wrapper">
                                <span class="count d-block" [countUp]="statistics?.technical" [options]="{duration: 6}">
                                    0
                                </span>
                                <span class="sign plus">+</span>
                            </span>
                            <span class="label">
                                {{"Home.YearsExprience" | translate}}
                            </span>
                        </div>
                        <div class="item-wrapper">
                            <span class="count-wrapper">
                                <span class="count d-block" [countUp]="statistics?.projects" [options]="{duration: 6}">
                                    0
                                </span>
                                <span class="sign plus">+</span>
                            </span>
                            <span class="label">
                                {{"Home.Projects" | translate}}
                            </span>
                        </div>
                        <div class="item-wrapper">
                            <span class="count-wrapper">
                                <span class="count d-block" [countUp]="statistics?.engineers" [options]="{duration: 6}">
                                    0
                                </span>
                                <span class="sign plus">+</span>
                                <span class="sign text">{{"Home.TON" | translate}}</span>
                            </span>
                            <span class="label">
                                {{"Home.Platforms" | translate}}
                            </span>
                        </div>
                        <div class="item-wrapper">
                            <span class="count-wrapper">
                                <span class="count d-block" [countUp]="statistics?.km_subsea_pipelines" [options]="{duration: 6}">
                                    0
                                </span>
                                <span class="sign plus">+</span>
                                <span class="sign text">{{"Home.KM" | translate}}</span>
                            </span>
                            <span class="label">
                                {{"Home.Pipelines" | translate}}
                            </span>
                        </div>
                    </div>
                </div>
                
            </div>
        </div>
        <button class="carousel-control-prev" type="button" data-bs-target="#carouselExampleCaptions" data-bs-slide="prev">
            <span class="carousel-control-prev-icon" aria-hidden="true"></span>
            <span class="visually-hidden">Previous</span>
        </button>
        <button class="carousel-control-next" type="button" data-bs-target="#carouselExampleCaptions" data-bs-slide="next">
            <span class="carousel-control-next-icon" aria-hidden="true"></span>
            <span class="visually-hidden">Next</span>
        </button>
        <div class="overlay"></div>
    </div>
    <div class="loader-wrapper">
        <app-loading  type="small" *ngIf="loading"></app-loading>
    </div>
</div>
