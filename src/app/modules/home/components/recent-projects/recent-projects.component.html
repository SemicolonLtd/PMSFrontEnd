<div class="recent-projects pb-4 pt-2">
    <div class="pms-container">
        <div class="recent-header mb-3 flex align-items-center justify-content-between">
            <div class="txt">
                <h2 class="title-font-size color-primary">{{"Home.RecentProjects" | translate}}</h2>
            </div>
            <a class="btn font-bold white-space-nowrap" routerLink="/projects">
                {{"General.ViewMore" | translate}}
            </a>
        </div>
        <div class="projects-data">
            <ng-container *ngIf="isBrowser">
                <p-tabView [scrollable]="true" (activeIndexChange)="onSelectCategory(projectCategories[$event].value)">
                    <p-tabPanel *ngFor="let category of projectCategories" [header]="category?.name">
                        <div class="grid" *ngIf="(bigCardNews || smallCardsNews?.length) && !loading">
                            <div class="sm:col-12 md:col-6 big-card-container p-1" *ngIf="bigCardNews">
                                <a class="big-card" [routerLink]="'/projects/details/' + bigCardNews?.slug">
                                    <p-card [header]="bigCardNews?.title">
                                        <ng-template pTemplate="header">
                                            <img alt="Card" [src]="bigCardNews?.image" />
                                        </ng-template>
                                        <!-- <p class="news-desc" [innerHTML]="bigCardNews?.short">
                                        </p> -->
                                        <ng-template pTemplate="footer">
                                            <!-- <span>{{bigCardNews?.date}}</span> -->
                                            <button class="discover_btn" [routerLink]="'/projects/details/' + bigCardNews?.slug">
                                                <i class="pi pi-angle-right" *ngIf="lang == 'en'"></i>
                                                <i class="pi pi-angle-left" *ngIf="lang == 'ar'"></i>
                                                <span>{{'General.DiscoverMore' | translate}}</span>
                                            </button>
                                        </ng-template>
                                    </p-card>
                                    <!-- <span class="news-badge desktop">
                                        {{bigCardNews?.category_title}}
                                    </span> -->
                                </a>
                            </div>
                            <div class="sm:col-12 md:col-6 small-cards-container" *ngIf="smallCardsNews?.length">
                                <div class="grid mx-0">
                                    <div class="sm:col-12 md:col-6 p-1" style="margin-bottom:10px" *ngFor="let card of smallCardsNews" >
                                        <a class="small-card"
                                        [routerLink]="'/projects/details/' + card?.slug">
                                            <p-card [header]="card?.title">
                                                <ng-template pTemplate="header">
                                                    <img alt="Card" [src]="card?.image" />
                                                </ng-template>
                                                <!-- <p class="news-desc" [innerHTML]="card?.short">
                                                </p> -->
                                                <ng-template pTemplate="footer">
                                                    <!-- <span>{{card?.date}}</span> -->
                                                    <button class="discover_btn" [routerLink]="'/projects/details/' + card?.slug">
                                                        <i class="pi pi-angle-right" *ngIf="lang == 'en'"></i>
                                                        <i class="pi pi-angle-left" *ngIf="lang == 'ar'"></i>
                                                        <span>{{'General.DiscoverMore' | translate}}</span>
                                                    </button>
                                                </ng-template>
                                            </p-card>
                                            <!-- <span class="news-badge desktop">
                                                {{card?.category_title}}
                                            </span> -->
                                        </a>
                                    </div>
                                </div>
                            </div>
                        </div>
                        <div class="loading_wrapper" *ngIf="loading">
                            <app-loading type="small"></app-loading>
                        </div>
                    </p-tabPanel>
                </p-tabView>
            </ng-container>
        </div>
    </div>
    <!-- <img class="wave-bottom" src="assets/images/home/wave-bottom.svg" alt=""> -->
</div>
