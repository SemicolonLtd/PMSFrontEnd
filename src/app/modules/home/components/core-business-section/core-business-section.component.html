<section class="core-business-section">
    <div class="grid pms-container w-full">
        <div class="lg:col-6 md:col-12 sm:col-12">
            <div class="core-info">
                <h2 class="core-title title-font-size color-primary">{{"Home.OurBusiness" | translate}}</h2>
                <p class="core-desc">
                    {{'General.OrgDesc' | translate}}
                </p>
                <div class="core-types grid mt-5">
                    <a class="col-6" *ngFor="let business of coreBusinessData"
                    routerLink="/core-business/{{business.slug}}">
                        <div class="core-card text-center border-round-md">
                            <div class="data p-4">
                                <img class=" mb-2" [src]="business?.icon" alt="">
                                <h3 class="card-title">{{ business.title }}</h3>
                            </div>
                        </div>
                    </a>
                </div>
            </div>
        </div>
        <div class="lg:col-6 position-relative core-images">
            <div class="front">
                <img src="assets/images/home/core-section.jpg" alt="">
            </div>
            <div class="back">
                <img src="assets/images/home/core-back.webp" alt="">
            </div>
        </div>
    </div>
    <!-- <img class="wave-top" src="assets/images/home/wave-top.svg" alt=""> -->

</section>
