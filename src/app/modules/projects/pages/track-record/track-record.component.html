<div class="project-details margin-avoid-navbar">

        <app-breadcrumb [breadcrumbItems]="breadcrumbItems"></app-breadcrumb>
        <app-loading type="small" *ngIf="loading"></app-loading>

            <app-track-record-table [trackRecordData]="trackRecordData"></app-track-record-table>
        </ng-container>
    </div>
</div>
