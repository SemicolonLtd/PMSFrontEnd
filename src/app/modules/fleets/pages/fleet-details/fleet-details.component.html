<div class="fleet-details">
    <div class="header flex align-items-center justify-content-center">
        <img [src]="fleetData?.image" alt="" class="cover">
        <div class="content">
            <h2 class="title">{{fleetData?.title}}</h2>
        </div>
    </div>
    <div class="pms-container">
        <app-breadcrumb [breadcrumbItems]="breadcrumbItems"></app-breadcrumb>
        <div class="content-wrapper col-12" *ngIf="!loading">
            <!-- <div class="images">
                <div class="news-images">
                    <p-galleria [value]="fleetData?.media" [responsiveOptions]="responsiveOptions"
                        [numVisible]="5" [showThumbnailNavigators]="fleetData?.media?.length > 5"
                        [showThumbnails]="fleetData?.media?.length > 1"
                        >
                        <ng-template pTemplate="item" let-item>
                            <p-image [preview]="true" [src]="item.image" />
                        </ng-template>
                        <ng-template pTemplate="thumbnail" let-item>
                            <div class="grid grid-nogutter justify-content-center">
                                <img [src]="item.image" style="width: 100%;" />
                            </div>
                        </ng-template>
                    </p-galleria>
                </div>
            </div> -->
            <div class="text" [innerHTML]="sanitizeHtml(fleetData?.desc)">
            </div>
        </div>
        <app-loading type="small" *ngIf="loading"></app-loading>
    </div>
    <div class="tables">
        <div class="pms-container">
            <div class="table-part w-100 mt-3 table-responsive" *ngFor="let table of fleetData?.tables">
                <table class="table table-striped table-bordered" style="table-layout: fixed; width: 100%;">
                    <thead>
                        <tr>
                            <th colspan="2" class="text-lg" style="color: white; background-color: var(--primary-color-light);">
                                {{table?.name}}
                            </th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr *ngFor="let dataRow of table.properties">
                            <td class="title-col" style="width: 50%;">{{ dataRow?.name }}</td>
                            <td class="info-col" style="width: 50%;">{{ dataRow?.value1 }}</td>
                            <!-- <td class="info-col">{{ dataRow?.value2 }}</td> -->
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>
</div>
