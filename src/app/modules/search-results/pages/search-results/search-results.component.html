<div class="search-results margin-avoid-navbar">
    <div class="details-content">
        <div class="pms-container">
            <div class="grid">
                <div class="col-12">
                    <div class="search-wrapper">
                        <p-iconField iconPosition="left">
                            <p-inputIcon styleClass="pi pi-search" />
                            <input type="text" pInputText placeholder="{{'General.SearchDesc' | translate}} "
                                [(ngModel)]="searchQuery" />
                        </p-iconField>
                        <p-button (click)="getSearchResults()" label="{{'SearchResults.Search' | translate}}"
                            icon="pi pi-search" class="search-btn" />
                    </div>
                </div>
                <div class="col-12" *ngIf="searchResults && !loading">
                    <p-tabView>
                        <p-tabPanel header="{{'SearchResults.Projects' | translate}}">
                            <div class="row" *ngIf="searchResults?.projects?.data.length ">
                                <div class="col-lg-6 col-md-6 col-sm-12">
                                    <app-search-results-card [card]="card"
                                        *ngFor="let card of searchResults?.projects?.data"></app-search-results-card>
                                </div>
                            </div>
                            <app-empty-state *ngIf="!searchResults?.projects?.data.length"></app-empty-state>

                        </p-tabPanel>
                        <p-tabPanel header="{{'SearchResults.News' | translate}}">
                            <div class="row" *ngIf="searchResults?.news?.data.length ">
                                <div class="col-lg-6 col-md-6 col-sm-12">
                                    <app-search-results-card [card]="card"
                                        *ngFor="let card of searchResults?.news?.data"></app-search-results-card>
                                </div>
                            </div>
                            <app-empty-state *ngIf="!searchResults?.news?.data.length"></app-empty-state>
                        </p-tabPanel>
                        <p-tabPanel header="{{'SearchResults.CoreBusiness' | translate}}">
                            <div class="row" *ngIf="searchResults?.coreBusiness?.data.length ">
                                <div class="col-lg-6 col-md-6 col-sm-12">
                                    <app-search-results-card [card]="card"
                                        *ngFor="let card of searchResults?.coreBusiness?.data"></app-search-results-card>
                                </div>
                            </div>
                            <app-empty-state *ngIf="!searchResults?.coreBusiness?.data.length"></app-empty-state>
                        </p-tabPanel>
                        <p-tabPanel header="{{'SearchResults.Events' | translate}}">
                            <div class="row" *ngIf="searchResults?.events?.data.length ">
                                <div class="col-lg-6 col-md-6 col-sm-12">
                                    <app-search-results-card [card]="card"
                                        *ngFor="let card of searchResults?.events?.data"></app-search-results-card>
                                </div>
                            </div>
                            <app-empty-state *ngIf="!searchResults?.events?.data.length"></app-empty-state>
                        </p-tabPanel>
                        <p-tabPanel header="{{'SearchResults.Pages' | translate}}">
                            <div class="row" *ngIf="searchResults?.pages?.data.length ">
                                <div class="col-lg-6 col-md-6 col-sm-12">
                                    <app-search-results-card [card]="card"
                                        *ngFor="let card of searchResults?.pages?.data"></app-search-results-card>
                                </div>
                            </div>
                            <app-empty-state *ngIf="!searchResults?.pages?.data.length"></app-empty-state>
                        </p-tabPanel>
                    </p-tabView>
                </div>
                <app-loading type="small" *ngIf="loading"></app-loading>
            </div>
        </div>
    </div>
</div>
