<div class="results-card" (click)="onClick()">
    <p-card [header]="card?.title | textSlice : 'title'">
        <ng-template pTemplate="header">
            <img alt="Card" [src]="card?.image" />
        </ng-template>
        <span class="news-badge">
            {{card?.category_title}}
        </span>
        <p [innerHTML]="card?.short | textSlice : 'desc'">
            <!-- {{card.description | slice: 0: 30}} -->
        </p>
        <ng-template pTemplate="footer">
            <span>{{card?.date}}</span>
        </ng-template>
    </p-card>
</div>
