<div class="news-details margin-avoid-navbar">
    <div class="pms-container">
        <div class="news-info">
            <div class="grid">
                <div class="col-12">
                    <h2 class="news-title">{{ newsData?.title }}</h2>
                </div>
                <div class="content-wrapper col-12">
                    <div class="images">
                        <div class="news-images">
                            <p-galleria [value]="newsData?.media" [responsiveOptions]="responsiveOptions"
                                [numVisible]="5">
                                <ng-template pTemplate="item" let-item>
                                    <img [src]="item.image" style="width: 100%;" />
                                </ng-template>
                                <ng-template pTemplate="thumbnail" let-item>
                                    <div class="grid grid-nogutter justify-content-center">
                                        <img [src]="item.image" style="width: 100%;" />
                                    </div>
                                </ng-template>
                            </p-galleria>
                        </div>
                    </div>
                    <div class="text" [innerHTML]="newsData?.desc">
                    </div>
                </div>
            </div>
        </div>
        <div class="similar-news mt-5 pb-5" *ngIf="similarNewsData?.length">
            <span class="title block font-bold text-2xl pb-2 mb-4">
                Similar News
            </span>
            <p-carousel [value]="similarNewsData" [numVisible]="3" [numScroll]="3" [circular]="true"
                [showIndicators]="false" [responsiveOptions]="responsiveOptions" autoplayInterval="3000">
                <ng-template let-news pTemplate="item">
                    <div class="mx-2">
                        <app-news-card [newsData]="news"></app-news-card>
                    </div>
                </ng-template>
            </p-carousel>

        </div>
    </div>
</div>
