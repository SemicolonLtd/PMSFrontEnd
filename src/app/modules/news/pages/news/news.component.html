<div class="news">
    <!-- <img src="assets/images/global/pages-wave-top.webp" alt="" class="pages-wave-top"> -->
    <!-- <app-search [Title]="searchTitle" (searchEmitter)="searchForNews($event)"></app-search> -->
    <div class="header flex align-items-center justify-content-center">
        <img src="assets/images/global/certificates.webp" alt="" class="cover">
        <div class="content">
            <h2 class="title">{{'Navbar.Media' | translate}}</h2>
            <!-- <span class="text mt-3">
                {{'Certificates.Desc' | translate}}
            </span> -->
        </div>
    </div>
    <div class="pms-container">
        <div class="news-data">
            <ng-container *ngIf="!searchMode && isBrowser">
                <p-tabView [scrollable]="true" (activeIndexChange)="onSelectCategory($event)" [activeIndex]="selectedIndex">
                    <p-tabPanel *ngFor="let category of newsCategories" [header]="category?.name">
                        <div class="grid">
                            <div class="sm:col-12 md:col-6 big-card-container p-1" *ngIf="bigCardNews?.length">
                                <a class="big-card" *ngFor="let card of bigCardNews"
                                [routerLink]="card.isEventCard ? 
                                '/events/details/' + card?.slug :
                                '/news/details/' + card?.slug"
                                >
                                    <p-card [header]="card?.title">
                                        <ng-template pTemplate="header">
                                            <img alt="Card" [src]="card?.image" />
                                        </ng-template>
                                        <!-- <p class="news-desc" [innerHTML]="card?.short">
                                        </p> -->
                                        <ng-template pTemplate="footer">
                                            <!-- <span>{{card?.date}}</span> -->
                                            <button class="discover_btn" [routerLink]="'/news/details/' + card?.slug">
                                                <i class="pi pi-angle-right" *ngIf="lang == 'en'"></i>
                                                <i class="pi pi-angle-left" *ngIf="lang == 'ar'"></i>
                                                <span>{{'General.DiscoverMore' | translate}}</span>
                                            </button>
                                        </ng-template>
                                    </p-card>
                                </a>
                            </div>
                            <div class="sm:col-12 md:col-6 small-cards-container" *ngIf="smallCardsNews?.length">
                                <div class="grid mx-0">
                                    <div class="sm:col-12 md:col-6 p-1" style="margin-bottom:10px" *ngFor="let card of smallCardsNews" >
                                        <a class="small-card"
                                        [routerLink]="card.isEventCard ? 
                                        '/events/details/' + card?.slug :
                                        '/news/details/' + card?.slug"
                                        >
                                            <p-card [header]="card?.title | textSlice : 'title' : 50">
                                                <ng-template pTemplate="header">
                                                    <img alt="Card" [src]="card?.image" />
                                                </ng-template>
                                                <!-- <p class="news-desc" [innerHTML]="card?.short | textSlice : 'desc' : 80">
                                                </p> -->
                                                <ng-template pTemplate="footer">
                                                    <!-- <span>{{card?.date}}</span> -->
                                                    <button class="discover_btn" [routerLink]="'/news/details/' + card?.slug">
                                                        <i class="pi pi-angle-right" *ngIf="lang == 'en'"></i>
                                                        <i class="pi pi-angle-left" *ngIf="lang == 'ar'"></i>
                                                        <span>{{'General.DiscoverMore' | translate}}</span>
                                                    </button>
                                                </ng-template>
                                            </p-card>
                                        </a>
                                    </div>

                                </div>
                            </div>
                        </div>
                    </p-tabPanel>
                </p-tabView>
            </ng-container>
            <ng-container *ngIf="searchMode">
                <div class="grid">
                    <div class="sm:col-12 md:col-6 big-card-container p-1" *ngIf="bigCardNews?.length">
                        <a class="big-card" *ngFor="let card of bigCardNews" routerLink="/news/details/{{card?.slug}}">
                            <p-card [header]="card?.title" >
                                <ng-template pTemplate="header">
                                    <img alt="Card" [src]="card?.image" />
                                </ng-template>
                                <!-- <p class="news-desc" [innerHTML]="card?.short">
                                </p> -->
                                <ng-template pTemplate="footer">
                                    <!-- <span>{{card?.date}}</span> -->
                                    <button class="discover_btn" [routerLink]="'/news/details/' + card?.slug">
                                        <i class="pi pi-angle-right" *ngIf="lang == 'en'"></i>
                                        <i class="pi pi-angle-left" *ngIf="lang == 'ar'"></i>
                                        <span>{{'General.DiscoverMore' | translate}}</span>
                                    </button>
                                </ng-template>
                            </p-card>
                        </a>
                    </div>
                    <div class="sm:col-12 md:col-6 small-cards-container" *ngIf="smallCardsNews?.length">
                        <div class="grid mx-0">
                            <div class="sm:col-12 md:col-6 p-1" style="margin-bottom:10px" *ngFor="let card of smallCardsNews" >
                                <a class="small-card" [routerLink]="'/news/details/' + card?.slug">
                                    <p-card [header]="card?.title">
                                        <ng-template pTemplate="header">
                                            <img alt="Card" [src]="card?.image" />
                                        </ng-template>
                                        <!-- <p class="news-desc" [innerHTML]="card?.short">
                                        </p> -->
                                        <ng-template pTemplate="footer">
                                            <!-- <span>{{card?.date}}</span> -->
                                            <button class="discover_btn" [routerLink]="'/news/details/' + card?.slug">
                                                <i class="pi pi-angle-right" *ngIf="lang == 'en'"></i>
                                                <i class="pi pi-angle-left" *ngIf="lang == 'ar'"></i>
                                                <span>{{'General.DiscoverMore' | translate}}</span>
                                            </button>
                                        </ng-template>
                                    </p-card>
                                </a>
                            </div>
                        </div>
                    </div>
                </div>
            </ng-container>
            <ng-container *ngFor="let schema of schemaList">
                <ngx-json-ld [json]="schema"></ngx-json-ld>
            </ng-container>
            <div class="load-more" *ngIf="(paginationData?.total! > newsData?.length!) &&!loading">
                <p-button label="More..." (click)="loadMore()" />
            </div>
            <app-loading type="small" *ngIf="loading"></app-loading>
            <app-empty-state *ngIf="!newsData?.length && !loading"></app-empty-state>
        </div>
    </div>
</div>
