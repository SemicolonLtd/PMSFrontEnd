<div class="center-bar flex align-items-center justify-content-center ">
    <div class="wrapper text-center">
        <h4 class="title subtitle-font-size">{{Title | translate}}</h4>
        <ng-container *ngIf="Desc">
            <span class="txt" *ngIf="!htmlDesc">
                {{Desc}}
            </span>
            <span class="txt" *ngIf="htmlDesc" [innerHtml]="Desc">
            </span>
        </ng-container>
    </div>
</div>
