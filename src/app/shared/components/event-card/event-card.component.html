<a class="event-card border-round-3xl" 
[routerLink]="cardType == 'event' ? '/events/details/'+ eventData.slug : '/tenders/details/'+ eventData.slug "
>
    <div class="img-wrapper">
        <img class="w-full border-round-3xl" [src]="eventData.image" alt="Project Image">
    </div>
    <div class="content">
        <div class="data">
            <div class="info">
                <h5 class="title">
                    {{eventData.title | textSlice : 'title' : 40}}
                </h5>
                <div class="short-desc">
                    {{eventData.pref | textSlice : 'desc' : 60}}
                </div>
                <div class="dates flex align-items-center justify-content-between mt-2">
                    <div class="start-date">
                        <span class="label font-semibold">
                            {{'Events.StartDate' | translate}}:
                        </span>
                        <span class="date">
                            {{eventData.date}}
                        </span>
                    </div>
                    <div class="end-date">
                        <span class="label font-semibold">
                            {{'Events.EndDate' | translate}}:
                        </span>
                        <span class="date">
                            {{eventData.end_date}}
                        </span>
                    </div>
                </div>
            </div>
        </div>
        <div class="actions">
            <span class="date">
                {{eventData.date | relativeTime}}
            </span>
            <!-- <div class="details-btn">
                <p-button icon="pi pi-share-alt" [rounded]="true" severity="secondary"/>
            </div> -->
        </div>
    </div>
</a>
