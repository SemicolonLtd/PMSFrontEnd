<div class="project-card">
    <div class="img-wrapper">
        <img class="w-full rounded-3" [src]="projectData.image" alt="Project Image">
    </div>
    <div class="content flex justify-content-between mt-3">
        <div class="info">
            <h5 class="title">
                {{projectData.title | textSlice : 'desc'}}
            </h5>
            <span class="date">
                {{projectData.date}}
            </span>
        </div>
        <a class="details-btn" [routerLink]="'/projects/details/'+ projectData.slug ">
            <p-button icon="pi pi-angle-right" [rounded]="true" severity="secondary"  />
        </a>
    </div>
</div>
